<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streams | Lexor2k</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    font-family: 'Orbitron', sans-serif;
    text-align: center;
    padding-top: 150px;
    min-height: 100vh;
}

h1 {
    font-size: 48px;
    color: #00ffcc;
    margin-bottom: 50px;
}

.stream-btn {
    display: inline-block;
    margin: 15px 0;
    padding: 15px 35px;
    background: #00ffcc;
    color: black;
    text-decoration: none;
    font-weight: 700;
    border-radius: 25px;
    transition: transform 0.3s, background 0.3s;
}

.stream-btn:hover {
    transform: scale(1.1);
    background: #fff;
}

.back-home {
    display: inline-block;
    margin-top: 50px;
    padding: 10px 25px;
    background: rgba(255,255,255,0.1);
    color: #00ffcc;
    text-decoration: none;
    border-radius: 20px;
    font-weight: 700;
    transition: 0.3s;
}

.back-home:hover {
    background: #00ffcc;
    color: black;
}

/* Mobile */
@media (max-width:768px){
    h1 {
        font-size: 36px;
    }
    .stream-btn {
        width: 80%;
        padding: 12px 0;
    }
}
</style>
</head>

<body>

<h1>Watch Lexor2k Live</h1>

<a href="https://kick.com/lexor2k" target="_blank" class="stream-btn">Kick</a><br>
<a href="https://www.youtube.com/@lexor2kOfficial" target="_blank" class="stream-btn">YouTube</a><br>
<a href="https://facebook.com/Lexor2k" target="_blank" class="stream-btn">Facebook</a><br>

<a href="index.html" class="back-home">⬅ Back Home</a>

</body>
</html>
